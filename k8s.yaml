apiVersion: apps/v1
kind: Deployment
metadata:
  name: kusursuz-web-app
  labels:
    app: web-app
spec:
  replicas: 3 # En az 3 pod olmalı ki biri güncellenirken diğerleri trafiği sırtlasın
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1       # Güncelleme sırasında mevcut replica sayısının en fazla 1 üzerine çıkabilir (3+1=4)
      maxUnavailable: 0 # Güncelleme sırasında ÇALIŞIR DURUMDAKİ podlardan HİÇBİRİ (0) kapatılamaz. Önce yenisi doğacak, sonra eskisi ölecek!
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
      - name: web-container
        image: devarsyf/kusursuz-app:latest # Senin kullanıcı adınla imaj adı
        ports:
        - containerPort: 80
        # Sağlık kontrolleri (K8s podun gerçekten açılıp açılmadığını buna bakarak anlar)
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kusursuz-web-service
spec:
  type: NodePort
  selector:
    app: web-app
  ports:
    - port: 80
      targetPort: 80
      nodePort: 32000 # Dış dünyadan tarayıcı ile bu porttan erişeceğiz
